<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container text-center" style="padding: 20px;">
        <div class="row align-items-start">
            <div class="col" style="font-size: 20px;">
                Bài Tập Thực Hành 2 - Excercise 2
            </div>
        </div>
        <form style="padding: 20px;">
            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="userId" placeholder="Enter Number">
                <label for="userId">ID</label>
            </div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="userName" placeholder="Enter Name">
                <label for="userName">Name</label>
            </div>

            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="userAge" placeholder="Enter Age">
                <label for="userAge">Age</label>
            </div>

            <button type="button" id="createUser" class="btn btn-primary" onclick="AddUserForm()">
                Submit
            </button>
        </form>
        <h1>User List</h1>
        <table class="table table-bordered table-hover" style="margin-top: 20px;">
            <thead>
                <tr>
                    <th scope="col">Id</th>
                    <th scope="col">Name</th>
                    <th scope="col">Age</th>
                </tr>
            </thead>
            <tbody id="userList">
            </tbody>
        </table>
    </div>


    <script src="/dist/excercise/excercise2/exercise2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
